AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation Template to deploy an S3 Gateway VPC Endpoint.'

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 'ID of the VPC where the S3 Gateway Endpoint will be deployed.'

  RouteTableId:
    Type: String
    Description: 'ID of the Route Table to associate with the S3 Gateway Endpoint.'

Resources:
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref RouteTableId
      Tags:
        - Key: createdby
          Value: pangoro24
        - Key: project
          Value: aws-cb-privatelink

Outputs:
  S3GatewayEndpointId:
    Description: 'ID of the S3 Gateway VPC Endpoint'
    Value: !Ref S3GatewayEndpoint
    Export:
      Name: !Sub '${AWS::StackName}-S3GatewayEndpointId'
