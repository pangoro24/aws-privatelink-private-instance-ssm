AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation Template for a Private VPC with 3 Private Subnets. No Internet Access provided.'

Parameters:
  VpcName:
    Type: String
    Default: 'MyPrivateVPC'
    Description: 'Name tag for the VPC.'

  VpcCidrBlock:
    Type: String
    Default: '10.0.0.0/24'
    Description: 'CIDR block for the private VPC. /24 provides 256 IPs, maintaining a small footprint.'
    AllowedPattern: '((\d{1,3})\.){3}\d{1,3}/\d{1,2}'
  
  Subnet1Name:
    Type: String
    Default: 'PrivateSubnet1'
    Description: 'Name tag for Private Subnet 1.'

  Subnet1CidrBlock:
    Type: String
    Default: '10.0.0.0/26'
    Description: 'CIDR block for Private Subnet 1 (64 IPs).'
    
  Subnet2Name:
    Type: String
    Default: 'PrivateSubnet2'
    Description: 'Name tag for Private Subnet 2.'

  Subnet2CidrBlock:
    Type: String
    Default: '10.0.0.64/26'
    Description: 'CIDR block for Private Subnet 2 (64 IPs).'
    
  Subnet3Name:
    Type: String
    Default: 'PrivateSubnet3'
    Description: 'Name tag for Private Subnet 3.'

  Subnet3CidrBlock:
    Type: String
    Default: '10.0.0.128/26'
    Description: 'CIDR block for Private Subnet 3 (64 IPs).'

  RouteTableName:
    Type: String
    Default: 'PrivateRouteTable'
    Description: 'Name tag for the Private Route Table.'

Resources:
  PrivateVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidrBlock
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
        - Key: Name
          Value: !Ref VpcName
        - Key: createdby
          Value: pangoro24
        - Key: project
          Value: aws-cb-privatelink

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref PrivateVpc
      CidrBlock: !Ref Subnet1CidrBlock
      AvailabilityZone: !Select [ 0, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Ref Subnet1Name
        - Key: createdby
          Value: pangoro24
        - Key: project
          Value: aws-cb-privatelink

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref PrivateVpc
      CidrBlock: !Ref Subnet2CidrBlock
      AvailabilityZone: !Select [ 1, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Ref Subnet2Name
        - Key: createdby
          Value: pangoro24
        - Key: project
          Value: aws-cb-privatelink

  PrivateSubnet3:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref PrivateVpc
      CidrBlock: !Ref Subnet3CidrBlock
      AvailabilityZone: !Select [ 2, !GetAZs '' ]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Ref Subnet3Name
        - Key: createdby
          Value: pangoro24
        - Key: project
          Value: aws-cb-privatelink

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref PrivateVpc
      Tags:
        - Key: Name
          Value: !Ref RouteTableName
        - Key: createdby
          Value: pangoro24
        - Key: project
          Value: aws-cb-privatelink

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet3RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet3
      RouteTableId: !Ref PrivateRouteTable

Outputs:
  VpcId:
    Description: 'ID of the newly created Private VPC'
    Value: !Ref PrivateVpc
    Export:
      Name: !Sub '${AWS::StackName}-VpcId'

  PrivateSubnet1Id:
    Description: 'ID of Private Subnet 1'
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet1Id'

  PrivateSubnet2Id:
    Description: 'ID of Private Subnet 2'
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet2Id'

  PrivateSubnet3Id:
    Description: 'ID of Private Subnet 3'
    Value: !Ref PrivateSubnet3
    Export:
      Name: !Sub '${AWS::StackName}-PrivateSubnet3Id'

  PrivateRouteTableId:
    Description: 'ID of the Private Route Table'
    Value: !Ref PrivateRouteTable
    Export:
      Name: !Sub '${AWS::StackName}-PrivateRouteTableId'
